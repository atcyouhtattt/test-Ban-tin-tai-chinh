<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hieuinvest Research</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--ob:#050507;--ox:#0D0D13;--gr:#15151D;--cd:#242433;--pt:#F5F3EF;--sv:#B4B7C0;--ash:#70737B;--gd:#D4B65E;--g2:#EDD891;--g3:#F7ECC8;--gdk:#8A7238;--em:#42E89B;--rb:#FF7A7A;--sp:#78B0FF;--ln:#26263340}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--ob);color:var(--pt);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6}
::selection{background:var(--gd);color:var(--ob)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--ob)}::-webkit-scrollbar-thumb{background:linear-gradient(var(--gd),var(--gdk))}
.serif{font-family:'Playfair Display',Georgia,serif}
.cormo{font-family:'Cormorant Garamond',Georgia,serif}
.mono{font-family:'JetBrains Mono',monospace}

/* LOGO */
.logo{display:inline-flex;align-items:center;gap:9px;user-select:none}
.logo-mark{width:34px;height:34px;position:relative;display:inline-flex;align-items:center;justify-content:center}
.logo-mark svg{width:100%;height:100%}
.logo-txt{font-family:'Playfair Display',serif;font-weight:800;font-size:1.15rem;letter-spacing:.02em;background:linear-gradient(135deg,var(--g3),var(--gd));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:.55rem;letter-spacing:.42em;color:var(--gd);text-transform:uppercase;margin-top:1px}

/* INPUT SCREEN */
.scr{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;position:relative;overflow:hidden}
.scr-bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(203,174,99,.06),transparent 60%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(203,174,99,.04),transparent 55%);pointer-events:none}
.hero-logo{margin-bottom:28px}
.hero-logo .logo-mark{width:64px;height:64px}
.hero-logo .logo-txt{font-size:2rem}
.hero-logo .logo-sub{font-size:.7rem;letter-spacing:.5em}
.inp-title{font-size:clamp(2rem,4.5vw,3rem);font-weight:900;line-height:1.1;margin:20px 0 4px;background:linear-gradient(160deg,var(--pt) 30%,var(--g2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px auto;max-width:280px}
.divider::before,.divider::after{content:'';height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gd))}
.divider::after{background:linear-gradient(90deg,var(--gd),transparent)}
.divider span{color:var(--gd);font-size:.7rem}
.inp-sub{color:var(--sv);font-size:.95rem;margin-bottom:38px;font-family:'Cormorant Garamond',serif;font-size:1.15rem;letter-spacing:.02em}
.inp-row{display:flex;max-width:460px;width:100%;margin:0 auto;box-shadow:0 8px 40px rgba(203,174,99,.08)}
.inp-row input{flex:1;padding:16px 20px;background:var(--ox);border:1px solid var(--cd);border-right:none;color:var(--pt);font-size:1.1rem;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;outline:none;text-transform:uppercase;transition:border .2s}
.inp-row input:focus{border-color:var(--gd)}
.inp-row input::placeholder{color:var(--ash);text-transform:none;font-family:'Inter',sans-serif;font-size:.9rem;letter-spacing:0}
.btn-go{padding:16px 32px;background:linear-gradient(135deg,var(--g2),var(--gd) 60%,var(--gdk));color:var(--ob);font-weight:700;font-size:.85rem;border:none;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;transition:filter .2s;white-space:nowrap}
.btn-go:hover{filter:brightness(1.12)}
.qp{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:34px;max-width:500px}
.qp button{padding:6px 15px;background:rgba(203,174,99,.04);border:1px solid var(--cd);color:var(--ash);font-size:.76rem;cursor:pointer;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;transition:all .2s}
.qp button:hover{border-color:var(--gd);color:var(--gd);background:rgba(203,174,99,.09)}
.err{margin-top:20px;padding:12px 16px;background:rgba(242,109,109,.06);border:1px solid var(--rb);color:var(--rb);font-size:.83rem;max-width:460px;white-space:pre-line;border-radius:2px}

/* LOADING */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.spinner{width:52px;height:52px;position:relative;margin-bottom:28px}
.spinner::before,.spinner::after{content:'';position:absolute;inset:0;border:2px solid transparent;border-radius:50%}
.spinner::before{border-top-color:var(--gd);animation:spin 1s linear infinite}
.spinner::after{border-bottom-color:var(--gdk);animation:spin 1.5s linear infinite reverse}
.ld-tk{font-size:1.3rem;margin-bottom:8px}.ld-tk span{color:var(--gd);font-family:'JetBrains Mono',monospace}
.ld-msg{color:var(--sv);font-size:.85rem;animation:pulse 1.6s ease-in-out infinite}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(8,8,12,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--cd);padding:10px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.nav .logo-mark{width:28px;height:28px}.nav .logo-txt{font-size:.95rem}.nav .logo-sub{display:none}
.nav-l{display:flex;align-items:center;gap:14px}
.nav-tk{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700;padding-left:14px;border-left:1px solid var(--cd)}
.badge{padding:4px 11px;font-size:.66rem;font-weight:700;letter-spacing:.05em;border-radius:2px}
.nav-r{display:flex;align-items:center;gap:12px;font-size:.77rem;flex-wrap:wrap}
.nav-r .inf{color:var(--sv)}.nav-r .inf b{color:var(--pt);font-family:'JetBrains Mono',monospace;font-weight:600}
.btn{padding:6px 13px;background:0;border:1px solid var(--cd);color:var(--sv);font-size:.72rem;cursor:pointer;transition:all .2s;white-space:nowrap;border-radius:2px}
.btn:hover{border-color:var(--gd);color:var(--gd)}
.btn-pdf{background:linear-gradient(135deg,rgba(228,206,140,.12),rgba(203,174,99,.08));border-color:var(--gd);color:var(--g2)}

/* HERO */
.hero{padding:64px 22px 48px;text-align:center;position:relative;background:linear-gradient(180deg,rgba(203,174,99,.03),transparent)}
.hero-crest{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:22px}
.hero-crest .l{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gd))}
.hero-crest .r{width:40px;height:1px;background:linear-gradient(90deg,var(--gd),transparent)}
.hero-crest span{color:var(--gd);letter-spacing:.4em;font-size:.68rem;text-transform:uppercase}
.hero-co{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3.6vw,2.6rem);font-weight:800;line-height:1.15;margin-bottom:12px;background:linear-gradient(160deg,var(--pt) 40%,var(--g2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-m{display:flex;align-items:center;justify-content:center;gap:11px;flex-wrap:wrap;margin-bottom:26px}
.hero-m .tk{font-family:'JetBrains Mono',monospace;font-size:1.1rem;color:var(--gd);font-weight:700;letter-spacing:.12em}
.hero-m .dot{width:4px;height:4px;background:var(--gd);border-radius:50%}.hero-m .i{font-size:.85rem;color:var(--sv)}
.verd{display:inline-flex;align-items:stretch;gap:0;background:linear-gradient(135deg,var(--ox),var(--gr));border:1px solid var(--cd);border-radius:3px;overflow:hidden;margin-bottom:24px;box-shadow:0 12px 48px rgba(0,0,0,.4)}
.verd-i{text-align:center;padding:18px 30px}
.verd-i+.verd-i{border-left:1px solid var(--cd)}
.verd-lb{font-size:.6rem;color:var(--sv);text-transform:uppercase;letter-spacing:.15em;margin-bottom:5px}
.verd-v{font-size:1.5rem;font-weight:800}
.hero-src{margin-top:14px;color:var(--ash);font-size:.73rem}
.hero-src .live{color:var(--em);font-weight:600}

/* MAIN */
.rpt{max-width:900px;margin:0 auto;padding:0 22px 80px}
.sec{margin-bottom:44px}
.sec-h{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:14px;position:relative}
.sec-h::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--gd),var(--cd) 40%,transparent)}
.sec-n{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:linear-gradient(135deg,var(--g2),var(--gd) 55%,var(--gdk));color:var(--ob);font-family:'Playfair Display',serif;font-size:.9rem;font-weight:800;flex-shrink:0;border-radius:2px}
.sec-t{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--pt)}
.gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gd),transparent);margin:38px 0;opacity:.5}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:14px}
.kp{background:linear-gradient(155deg,var(--ox),var(--gr));border:1px solid var(--cd);padding:18px 16px;position:relative;overflow:hidden;border-radius:2px;transition:border .2s}
.kp:hover{border-color:var(--gdk)}
.kp-bar{position:absolute;top:0;left:0;right:0;height:2px}
.kp-v{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;line-height:1.1}
.kp-l{font-size:.73rem;color:var(--sv);margin-top:8px;letter-spacing:.02em}

/* PROSE */
.prose{color:var(--sv);line-height:1.85;font-size:.94rem;margin-bottom:15px;white-space:pre-line}
.prose strong{color:var(--pt);font-weight:600}
.co{padding:16px 20px;margin:15px 0;background:linear-gradient(135deg,var(--ox),var(--gr));border-radius:2px}
.co-t{font-weight:700;font-size:.86rem;margin-bottom:6px;letter-spacing:.02em}.co-b{color:var(--sv);font-size:.88rem;line-height:1.75}

/* TABLE */
.dt-wrap{overflow-x:auto;margin:15px 0;border:1px solid var(--cd);border-radius:2px}
.dt{width:100%;border-collapse:collapse;font-size:.82rem}
.dt th{padding:11px 13px;text-align:right;color:var(--g2);font-weight:600;background:linear-gradient(135deg,var(--gr),var(--cd));white-space:nowrap;letter-spacing:.02em}
.dt th:first-child{text-align:left}
.dt td{padding:10px 13px;text-align:right;color:var(--sv);border-top:1px solid var(--cd);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.dt td:first-child{text-align:left;color:var(--pt);font-weight:600;font-family:'Inter',sans-serif}
.dt tbody tr:hover{background:rgba(203,174,99,.03)}

/* CHART */
.chart-box{background:linear-gradient(155deg,var(--ox),var(--gr));border:1px solid var(--cd);padding:22px;margin:18px 0;position:relative;border-radius:3px}
.chart-box::before{content:'';position:absolute;top:0;left:22px;right:22px;height:2px;background:linear-gradient(90deg,var(--gd),transparent 70%)}
.chart-box h4{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--g2);font-weight:700;margin-bottom:18px;letter-spacing:.03em}
.chart-wrap{position:relative;width:100%;height:300px}

/* SHAREHOLDER */
.sh{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.sh-nm{flex:1;font-size:.83rem;color:var(--sv);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sh-br{width:170px;height:8px;background:var(--gr);flex-shrink:0;border-radius:4px;overflow:hidden}
.sh-fl{height:100%;background:linear-gradient(90deg,var(--gdk),var(--gd),var(--g2));border-radius:4px}
.sh-pc{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--g2);width:48px;text-align:right;flex-shrink:0;font-weight:600}

/* RISK/CAT */
.rc{display:flex;gap:11px;padding:13px 16px;margin-bottom:8px;background:linear-gradient(135deg,var(--ox),var(--gr));border-radius:2px}
.rc-rk{border-left:3px solid var(--rb)}.rc-ct{border-left:3px solid var(--em)}
.rc-n{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;flex-shrink:0;margin-top:1px}
.rc-tx{color:var(--sv);font-size:.88rem;line-height:1.65}

/* FOOTER */
.ftr{text-align:center;padding-top:36px}
.ftr .logo{margin-bottom:14px}
.ftr p{color:var(--ash);font-size:.72rem;line-height:1.7;max-width:580px;margin:0 auto}
.ftr .cop{color:var(--ash);font-size:.66rem;margin-top:12px}

@media print{
  .nav,.btn{display:none!important}
  body{background:#fff!important;color:#111!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hero,.rpt,.sec,.kp,.co,.chart-box,.rc,.dt-wrap,.verd{background:#fff!important;border-color:#ccc!important}
  .hero-co,.kp-v,.sec-t,.verd-v,.logo-txt{-webkit-text-fill-color:#111!important;color:#111!important;background:none!important}
  .kp-l,.prose,.co-b,.rc-tx,.sh-nm,.ftr p{color:#444!important}
  .sec-n{background:var(--gd)!important;-webkit-text-fill-color:#fff!important}
  .chart-wrap{height:240px!important}
}
@media(max-width:900px){.kg{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.verd{flex-direction:column}.verd-i+.verd-i{border-left:none;border-top:1px solid var(--cd)}.kg{grid-template-columns:repeat(2,1fr)}.sh-br{width:100px}}
</style>
</head>
<body>
<div class="scr-bg"></div>
<div id="app"></div>
<script>
const C={gd:'#D4B65E',g2:'#EDD891',g3:'#F7ECC8',gdk:'#8A7238',em:'#42E89B',rb:'#FF7A7A',sp:'#78B0FF',sv:'#B4B7C0',ash:'#70737B',cd:'#242433',gr:'#15151D'};
const RC={'MUA':C.em,'KHẢ QUAN':C.em,'OUTPERFORM':C.em,'TÍCH LŨY':C.sp,'NẮM GIỮ':C.gd,'NEUTRAL':C.gd,'GIẢM TỶ TRỌNG':C.rb,'BÁN':C.rb};
const fm=n=>(n==null||isNaN(n))?'—':Number(n).toLocaleString('vi-VN',{maximumFractionDigits:1});
const fp=n=>(n==null||isNaN(n)||n===0)?'—':(n>0?'+':'')+Number(n).toFixed(1)+'%';
const fx=(n,s)=>(n==null||isNaN(n)||n===0)?'—':Number(n).toFixed(1)+s;
let charts=[];

const LOGO=`<span class="logo"><span class="logo-mark"><svg viewBox="0 0 100 100" fill="none"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F2E4BC"/><stop offset=".5" stop-color="#CBAE63"/><stop offset="1" stop-color="#8A7238"/></linearGradient></defs><path d="M50 6 L86 28 L86 72 L50 94 L14 72 L14 28 Z" stroke="url(#lg)" stroke-width="3" fill="none"/><path d="M38 34 L38 66 M62 34 L62 66 M38 50 L62 50" stroke="url(#lg)" stroke-width="5" stroke-linecap="round"/></svg></span><span><span class="logo-txt">Hieuinvest</span><div class="logo-sub">Research</div></span></span>`;

function showInput(err){
  document.getElementById('app').innerHTML=`<div class="scr"><div style="max-width:480px;width:100%">
    <div class="hero-logo">${LOGO}</div>
    <h1 class="inp-title serif">Phân tích Doanh nghiệp</h1>
    <div class="divider"><span>◆</span></div>
    <p class="inp-sub">Nhập mã cổ phiếu</p>
    <div class="inp-row"><input id="ti" placeholder="VD: KDH, VCB, FPT..." maxlength="10"><button class="btn-go" onclick="go()">Phân tích →</button></div>
    ${err?'<div class="err">'+err+'</div>':''}
    <div class="qp">${['VCB','KDH','FPT','MWG','HPG','BID','TCB','VNM','VHM','PNJ','VCG','HDB'].map(t=>'<button onclick="document.getElementById(\'ti\').value=\''+t+'\'">'+t+'</button>').join('')}</div>
  </div></div>`;
  const ti=document.getElementById('ti');ti.focus();ti.onkeydown=e=>{if(e.key==='Enter')go()};
}

function showLoading(tk){
  document.getElementById('app').innerHTML=`<div class="scr"><div style="margin-bottom:32px">${LOGO}</div><div class="spinner"></div>
    <div class="ld-tk serif">Đang phân tích <span>${tk}</span></div>
    <div class="ld-msg" id="lm">Lấy giá realtime và dữ liệu tài chính...</div></div>`;
}

async function go(){
  const tk=(document.getElementById('ti')?.value||'').toUpperCase().trim();
  if(!tk)return;
  showLoading(tk);
  try{
    const r=await fetch('/api/analyze?ticker='+tk);
    if(!r.ok)throw new Error('Lỗi kết nối: '+(await r.text()));
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    showReport(d);
  }catch(e){showInput(e.message)}
}

function showReport(d){
  charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];
  const rc=RC[d.recommendation]||C.gd, now=new Date();
  const fin=d.financials||[],fc=d.forecast||[];
  const allP=[...fin.map(f=>({y:f.year,v:f.net_profit_bn,t:'a'})),...fc.map(f=>({y:f.year,v:f.net_profit_bn,t:'f'}))].filter(x=>x.v!=null&&x.v!==0);
  const sh=(d.shareholders||[]).filter(s=>s.pct>0).sort((a,b)=>b.pct-a.pct);
  const isLive=(d.data_source||'').includes('realtime');

  document.getElementById('app').innerHTML=`
  <div class="nav"><div class="nav-l">${LOGO}<span class="nav-tk">${d.ticker}</span>
    <span class="badge" style="background:${rc}22;color:${rc}">${d.recommendation||'—'}</span></div>
    <div class="nav-r"><span class="inf">Giá <b>${fm(d.current_price)}đ</b></span>
    ${d.target_price?`<span class="inf">→ <b style="color:var(--gd)">${fm(d.target_price)}đ</b></span>`:''}
    <button class="btn btn-pdf" onclick="window.print()">⤓ Xuất PDF</button>
    <button class="btn" onclick="showInput()">← Mã khác</button></div></div>

  <header class="hero">
    <div class="hero-crest"><span class="l"></span><span>Hieuinvest Research</span><span class="r"></span></div>
    <h1 class="hero-co">${d.company_name||d.ticker}</h1>
    <div class="hero-m"><span class="tk">${d.ticker}</span><span class="dot"></span><span class="i">${d.exchange||''}</span><span class="dot"></span><span class="i">${d.sector||''}</span></div>
    <div class="verd">
      <div class="verd-i"><div class="verd-lb">Khuyến nghị</div><div class="verd-v serif" style="color:${rc}">${d.recommendation||'—'}</div></div>
      ${d.target_price?`<div class="verd-i"><div class="verd-lb">Giá mục tiêu</div><div class="verd-v mono" style="color:var(--gd)">${fm(d.target_price)}đ</div></div>`:''}
      ${d.upside_pct?`<div class="verd-i"><div class="verd-lb">Tiềm năng</div><div class="verd-v mono" style="color:${d.upside_pct>0?C.em:C.rb}">${fp(d.upside_pct)}</div></div>`:''}
    </div>
    <div class="hero-src">Ngày lập báo cáo ${now.toLocaleDateString('vi-VN',{day:'numeric',month:'long',year:'numeric'})}${isLive?' · <span class="live">● Giá cập nhật realtime</span>':''}</div>
  </header>

  <main class="rpt">
    ${SEC('I','Tổng quan Đầu tư',`
      <div class="kg">${KP('Giá hiện tại',fm(d.current_price)+'đ')}${KP('Vốn hóa (tỷ)',fm(d.market_cap_bn))}${KP('EPS',fm(d.eps),C.g2)}${KP('P/E',fx(d.pe,'x'),C.sp)}${KP('P/B',fx(d.pb,'x'),C.sp)}${KP('ROE',fx(d.roe_pct,'%'),d.roe_pct>15?C.em:C.gd)}</div>
      <div class="kg">${d.roa_pct?KP('ROA',fx(d.roa_pct,'%'),C.sp):''}${d.ev_ebitda?KP('EV/EBITDA',fx(d.ev_ebitda,'x'),C.sp):''}${d.high_52w?KP('Đỉnh 52 tuần',fm(d.high_52w),C.em):''}${d.low_52w?KP('Đáy 52 tuần',fm(d.low_52w),C.rb):''}${d.beta?KP('Beta',Number(d.beta).toFixed(2),C.sv):''}${d.dividend_yield_pct?KP('Cổ tức',fx(d.dividend_yield_pct,'%'),C.em):''}${d.nim_pct!=null?KP('NIM',fx(d.nim_pct,'%'),C.sp):''}${d.car_pct!=null?KP('CAR',fx(d.car_pct,'%'),C.sp):''}${d.npl_pct!=null?KP('Nợ xấu',fx(d.npl_pct,'%'),d.npl_pct>2?C.rb:C.em):''}</div>`)}

    <div class="gold-line"></div>
    ${SEC('II','Hồ sơ Doanh nghiệp',`
      <p class="prose">${d.description||''}</p>
      ${d.business_segments?CO(C.sp,'Mô hình kinh doanh',d.business_segments):''}
      ${d.key_projects?CO(C.gd,'Dự án trọng điểm',d.key_projects):''}
      ${sh.length?`<div style="margin-top:22px"><div class="cormo" style="font-size:1.1rem;color:var(--g2);font-weight:700;margin-bottom:12px">Cơ cấu cổ đông</div>${sh.map(s=>`<div class="sh"><div class="sh-nm">${s.name}</div><div class="sh-br"><div class="sh-fl" style="width:${Math.min(s.pct,100)}%"></div></div><div class="sh-pc">${s.pct.toFixed(1)}%</div></div>`).join('')}</div>`:''}`)}

    <div class="gold-line"></div>
    ${SEC('III','Kết quả Kinh doanh',`
      ${d.recent_results?`<p class="prose">${d.recent_results}</p>`:''}
      ${fin.length?TABLE(['Chỉ tiêu',...fin.map(f=>f.year)],[
        ['Doanh thu (tỷ)',...fin.map(f=>fm(f.revenue_bn))],
        ['LNST (tỷ)',...fin.map(f=>fm(f.net_profit_bn))],
        ['Biên gộp (%)',...fin.map(f=>f.gross_margin_pct!=null?Number(f.gross_margin_pct).toFixed(1):'—')],
        ['Biên ròng (%)',...fin.map(f=>f.net_margin_pct!=null?Number(f.net_margin_pct).toFixed(1):'—')]
      ]):''}
      <div class="chart-box"><h4>Doanh thu và Lợi nhuận sau thuế (tỷ đồng)</h4><div class="chart-wrap"><canvas id="c1"></canvas></div></div>
      <div class="chart-box"><h4>Biên lợi nhuận qua các năm (%)</h4><div class="chart-wrap"><canvas id="c2"></canvas></div></div>`)}

    <div class="gold-line"></div>
    ${SEC('IV','Bối cảnh Ngành và Triển vọng',`
      ${d.industry_context?`<p class="prose">${d.industry_context}</p>`:''}
      ${d.outlook?`<p class="prose">${d.outlook}</p>`:''}
      ${fc.length?TABLE(['Dự phóng',...fc.map(f=>f.year)],[
        ['Doanh thu (tỷ)',...fc.map(f=>fm(f.revenue_bn))],
        ['LNST (tỷ)',...fc.map(f=>fm(f.net_profit_bn))],
        ['Biên ròng (%)',...fc.map(f=>f.net_margin_pct!=null?Number(f.net_margin_pct).toFixed(1):'—')]
      ]):''}
      ${allP.length>3?`<div class="chart-box"><h4>Lợi nhuận sau thuế: Thực tế và Dự phóng (tỷ đồng)</h4><div class="chart-wrap"><canvas id="c3"></canvas></div></div>`:''}`)}

    <div class="gold-line"></div>
    ${SEC('V','Định giá',`
      ${d.valuation_method?CO(C.gd,'Phương pháp: '+d.valuation_method,d.valuation_rationale||''):''}
      ${d.target_price&&d.current_price?`<div class="kg" style="grid-template-columns:repeat(3,1fr)">${KP('Giá hiện tại',fm(d.current_price)+'đ',C.sv)}${KP('Giá mục tiêu',fm(d.target_price)+'đ',C.gd)}${KP('Tiềm năng',fp(d.upside_pct),d.upside_pct>0?C.em:C.rb)}</div>`:''}`)}

    <div class="gold-line"></div>
    ${SEC('VI','Rủi ro và Yếu tố Xúc tác',`
      ${(d.risks||[]).length?`<div style="margin-bottom:22px"><div class="cormo" style="font-size:1.1rem;color:var(--rb);font-weight:700;margin-bottom:12px">Rủi ro chính</div>${d.risks.map((r,i)=>`<div class="rc rc-rk"><span class="rc-n" style="color:var(--rb)">${String(i+1).padStart(2,'0')}</span><span class="rc-tx">${r}</span></div>`).join('')}</div>`:''}
      ${(d.catalysts||[]).length?`<div><div class="cormo" style="font-size:1.1rem;color:var(--em);font-weight:700;margin-bottom:12px">Yếu tố xúc tác</div>${d.catalysts.map((c,i)=>`<div class="rc rc-ct"><span class="rc-n" style="color:var(--em)">${String(i+1).padStart(2,'0')}</span><span class="rc-tx">${c}</span></div>`).join('')}</div>`:''}`)}

    <div class="gold-line"></div>
    <footer class="ftr">${LOGO}
      <p>Báo cáo được biên soạn tự động bởi hệ thống Hieuinvest Research, tổng hợp từ dữ liệu thị trường thời gian thực và trí tuệ nhân tạo. Nội dung chỉ mang tính tham khảo, không cấu thành khuyến nghị đầu tư. Nhà đầu tư chịu trách nhiệm hoàn toàn với quyết định của mình.</p>
      <div class="cop">© ${now.getFullYear()} Hieuinvest Research · ${d.ticker} · ${now.toLocaleString('vi-VN')}</div>
    </footer>
  </main>`;

  requestAnimationFrame(()=>setTimeout(()=>{
    mkBar('c1',fin.map(f=>f.year),[{l:'Doanh thu',d:fin.map(f=>f.revenue_bn),c:C.gd},{l:'LNST',d:fin.map(f=>f.net_profit_bn),c:C.em}]);
    mkLine('c2',fin.map(f=>f.year),[{l:'Biên gộp',d:fin.map(f=>f.gross_margin_pct),c:C.gd},{l:'Biên ròng',d:fin.map(f=>f.net_margin_pct),c:C.em}]);
    if(allP.length>3)mkBar('c3',allP.map(a=>a.y),[{l:'LNST',d:allP.map(a=>a.v),c:allP.map(a=>a.t==='f'?C.sp:C.gd)}]);
  },300));
}

function SEC(n,t,body){return`<section class="sec"><div class="sec-h"><span class="sec-n">${n}</span><span class="sec-t">${t}</span></div>${body}</section>`}
function KP(l,v,c){c=c||C.gd;return`<div class="kp"><div class="kp-bar" style="background:linear-gradient(90deg,${c},transparent)"></div><div class="kp-v" style="color:${c}">${v}</div><div class="kp-l">${l}</div></div>`}
function CO(c,t,b){return`<div class="co" style="border-left:3px solid ${c}"><div class="co-t" style="color:${c}">${t}</div><div class="co-b">${b}</div></div>`}
function TABLE(head,rows){return`<div class="dt-wrap"><table class="dt"><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}

// ═══ CHARTS — POWER BI STYLE ═══
function gradient(ctx,color){
  const g=ctx.createLinearGradient(0,0,0,300);
  g.addColorStop(0,color);g.addColorStop(1,color+'22');return g;
}
function mkBar(id,labels,datasets){
  const el=document.getElementById(id);if(!el||!labels.length)return;
  const ctx=el.getContext('2d');
  const ds=datasets.map(d=>({
    label:d.l,data:d.d,
    backgroundColor:Array.isArray(d.c)?d.c.map(c=>gradient(ctx,c)):gradient(ctx,d.c),
    borderColor:Array.isArray(d.c)?d.c:d.c,borderWidth:0,borderRadius:4,barPercentage:.6,categoryPercentage:.7
  }));
  charts.push(new Chart(ctx,{type:'bar',data:{labels,datasets:ds},options:cOpt()}));
}
function mkLine(id,labels,datasets){
  const el=document.getElementById(id);if(!el||!labels.length)return;
  const ctx=el.getContext('2d');
  const ds=datasets.map(d=>({
    label:d.l,data:d.d,borderColor:d.c,backgroundColor:gradient(ctx,d.c),fill:true,tension:.35,
    pointRadius:5,pointBackgroundColor:d.c,pointBorderColor:'#08080C',pointBorderWidth:2,borderWidth:2.5
  }));
  charts.push(new Chart(ctx,{type:'line',data:{labels,datasets:ds},options:{...cOpt(),scales:{...cOpt().scales,y:{...cOpt().scales.y,ticks:{...cOpt().scales.y.ticks,callback:v=>v+'%'}}}}}));
}
function cOpt(){return{
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{color:C.sv,font:{size:12,family:'Inter'},usePointStyle:true,pointStyle:'rectRounded',padding:16}},
    tooltip:{backgroundColor:'#0F0F16',titleColor:C.g2,bodyColor:C.sv,borderColor:C.cd,borderWidth:1,padding:12,cornerRadius:4,titleFont:{family:'Inter',weight:'600'},bodyFont:{family:'JetBrains Mono'}}},
  scales:{
    x:{ticks:{color:C.sv,font:{size:11,family:'JetBrains Mono'}},grid:{display:false},border:{color:C.cd}},
    y:{ticks:{color:C.ash,font:{size:10,family:'JetBrains Mono'},callback:v=>v>=1000?(v/1000).toFixed(0)+'K':v},grid:{color:'rgba(38,38,51,.5)'},border:{display:false}}
  }
}}

showInput();
</script>
</body>
</html>
